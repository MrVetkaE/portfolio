body::before {
  content: '';
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.62);
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  z-index: 0;
  pointer-events: none;
}

/* ── TERMINAL OVERLAY ── */
#term {
  position: fixed; inset: 0;
  background: #000;
  z-index: 500;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  padding: 30px 30px;
  transition: opacity 0.9s ease;
}
#term.fade { opacity: 0; pointer-events: none; }

#tbox {
  width: 100%;
  max-width: 560px;
  font-family: monospace;
  font-size: 14px;
  line-height: 1.9;
}

.tl {
  display: block;
  white-space: pre-wrap;
  word-break: break-all;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.25s, transform 0.25s;
}
.tl.v { opacity: 1; transform: none; }

.g  { color: #4ade80; }
.w  { color: #ffffff; }
.c  { color: #86efac; }
.d  { color: #4b5563; }
.r  { color: #f87171; }

/* ── MAIN ── */
canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.card {
  position: relative;
  z-index: 1;
  width: 420px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05) inset, 0 1px 0 rgba(255,255,255,0.15) inset;
  transform-style: preserve-3d;
  transition: box-shadow 0.4s, transform 0.15s ease-out;
  padding: 44px 40px 36px;
  opacity: 0;
  animation: none;
}
.card.show { animation: floatIn 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes floatIn {
  from { opacity:0; transform: translateY(40px) scale(0.96); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.card-glow {
  position: absolute; inset: 0; border-radius: 18px;
  opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 0;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,0.07), transparent 60%);
}
.card:hover .card-glow { opacity: 1; }

.avatar-wrap { position: relative; width: 72px; height: 72px; margin-bottom: 24px; }
.avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg,#1a1a2e,#2a2a4a);
  border: 2px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  position: relative; z-index: 1;
}
.avatar-ring {
  position: absolute; inset: -5px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.1);
  animation: spin 8s linear infinite;
  border-top-color: rgba(255,255,255,0.4);
}
@keyframes spin { to { transform: rotate(360deg); } }

.status { display: inline-flex; align-items: center; gap: 7px; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 20px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.6} }

.name { font-family: 'Unbounded', sans-serif; font-size: 1.45rem; font-weight: 900; color: #fff; line-height: 1.25; margin-bottom: 4px; letter-spacing: -0.01em; }
.sub-name { font-size: 0.72rem; color: rgba(255,255,255,0.3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 28px; }
.divider { height: 1px; background: linear-gradient(90deg,rgba(255,255,255,0.12),transparent); margin-bottom: 28px; }

.label { font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 12px; text-shadow: 0 0 12px rgba(255,255,255,0.3); }
.skills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.skill {
  font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.65);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 7px 14px; cursor: default;
  transition: all 0.25s; user-select: none;
}
.skill:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); color: #fff; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

.contacts { display: flex; flex-direction: column; gap: 0; margin-bottom: 32px; }
.contact-row {
  display: flex; align-items: center; gap: 14px;
  padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: all 0.25s; cursor: pointer; text-decoration: none;
  border-radius: 4px;
}
.contact-row:last-child { border-bottom: none; }
.contact-row:hover { padding-left: 6px; }
.contact-row:hover .ci { opacity: 1; }
.contact-row:hover .cv { color: #fff; }
.ci { width: 30px; height: 30px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; opacity: 0.5; transition: opacity 0.25s; flex-shrink: 0; }
.ck { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.2); min-width: 36px; }
.cv { font-size: 0.72rem; color: rgba(255,255,255,0.45); transition: color 0.25s; }

.btns { display: flex; gap: 10px; }
.btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-family: monospace; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.25s; font-weight: 500; }
.btn-solid { background: rgba(255,255,255,0.9); color: #000; }
.btn-solid:hover { background: #fff; box-shadow: 0 8px 24px rgba(255,255,255,0.2); transform: translateY(-2px); }
.btn-ghost { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }
.btn-ghost:hover { background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-2px); }
</style>
</head>
<body>

<!-- TERMINAL -->
<div id="term">
  <div id="tbox"></div>
</div>

<canvas id="c"></canvas>

<div class="card" id="card">
  <div class="card-glow" id="glow"></div>
  <div class="avatar-wrap">
    <div class="avatar">👨‍💻</div>
    <div class="avatar-ring"></div>
  </div>
  <div class="status"><div class="dot"></div>Открыт для работы</div>
  <div class="name">MrBetka</div>
  <div class="sub-name">Developer</div>
  <div class="divider"></div>
  <div class="label">// Навыки</div>
  <div class="skills">
    <div class="skill">HTML</div>
    <div class="skill">CSS</div>
    <div class="skill">JavaScript</div>
    <div class="skill">Python</div>
  </div>
  <div class="btns">
    <button class="btn btn-solid" onclick="alert('Портфолио скоро!')">Портфолио</button>
    <a href="https://t.me/AnonMSG" target="_blank" class="btn btn-ghost" style="text-decoration:none;display:flex;align-items:center;justify-content:center;">✉️ Написать анонимно</a>
  </div>
</div>

<script>
// ── TERMINAL ──
const LINES = [
  ['g', 'root@kali:~# ', 'w', 'init system...'],
  ['c', '  → kernel loaded successfully'],
  ['c', '  → mounting filesystem...'],
  ['d', '  /dev/sda1 mounted at /'],
  ['g', 'root@kali:~# ', 'w', 'whoami'],
  ['c', '  erul_kuanyshuly'],
  ['g', 'root@kali:~# ', 'w', 'cat /etc/skills'],
  ['c', '  HTML  ████████░░  80%'],
  ['c', '  CSS   ████████░░  85%'],
  ['c', '  JS    ███████░░░  75%'],
  ['c', '  PY    ███████░░░  70%'],
  ['g', 'root@kali:~# ', 'w', 'launch portfolio.sh'],
  ['c', '  [####################] 100%'],
  ['g', '  ✓ Portfolio ready. Launching...'],
];

const tbox = document.getElementById('tbox');
const term  = document.getElementById('term');
let idx = 0;

function showNext() {
  if (idx >= LINES.length) {
    setTimeout(() => {
      term.classList.add('fade');
      setTimeout(() => { term.style.display='none'; }, 900);
      document.getElementById('card').classList.add('show');
    }, 600);
    return;
  }
  const row = LINES[idx++];
  const span = document.createElement('span');
  span.className = 'tl';
  if (row.length === 4) {
    span.innerHTML = '<span class="' + row[0] + '">' + row[1] + '</span><span class="' + row[2] + '">' + row[3] + '</span>';
  } else {
    span.innerHTML = '<span class="' + row[0] + '">' + row[1] + '</span>';
  }
  tbox.appendChild(span);
  requestAnimationFrame(() => requestAnimationFrame(() => span.classList.add('v')));
  tbox.scrollTop = tbox.scrollHeight;
  const delay = 80;
  setTimeout(showNext, delay);
}

setTimeout(showNext, 100);

// ── PARTICLES ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, pts = [];
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);
for (let i=0;i<55;i++) pts.push({ x:Math.random()*2000, y:Math.random()*1200, vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3, r:Math.random()*1.5+.3, a:Math.random() });
(function draw() {
  ctx.clearRect(0,0,W,H);
  pts.forEach(p => {
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${p.a*.4})`; ctx.fill();
  });
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++) {
    const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<120){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(255,255,255,${(1-d/120)*.06})`;ctx.stroke();}
  }
  requestAnimationFrame(draw);
})();

// ── 3D TILT ──
const card = document.getElementById('card');
const glow = document.getElementById('glow');
document.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  const dx=(e.clientX-r.left-r.width/2)/(r.width/2);
  const dy=(e.clientY-r.top-r.height/2)/(r.height/2);
  card.style.transform=`perspective(900px) rotateY(${dx*10}deg) rotateX(${-dy*10}deg) scale(1.02)`;
  glow.style.setProperty('--mx',((e.clientX-r.left)/r.width*100).toFixed(1)+'%');
  glow.style.setProperty('--my',((e.clientY-r.top)/r.height*100).toFixed(1)+'%');
});
card.addEventListener('mouseleave', () => { card.style.transform='perspective(900px) rotateY(0) rotateX(0) scale(1)'; });
</script>
</body>
